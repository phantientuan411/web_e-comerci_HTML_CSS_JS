<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="../home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Contact Us</title>
</head>

<body>
    <header id="head">
    </header>
    <div class="contact-wrapper">
        <div class="contact-container">

            <aside class="contact-info">
                <div class="info-group">
                    <div class="icon-title">
                        <div class="icon-red"><i class="fa-solid fa-phone"></i></div>
                        <h3>Call To Us</h3>
                    </div>
                    <span>We are available 24/7, 7 days a week.</span>
                    <span>Phone: +84978383832</span>
                </div>

                <hr>
                <div class="info-group">
                    <div class="icon-title">
                        <div class="icon-red"><i class="fa-solid fa-envelope"></i></div>
                        <h3>Write To Us</h3>
                    </div>
                    <span>Fill out our form and we will contact you within 24 hours.</span>
                    <span>Emails: customer@exclusive.com</span>
                    <span>Emails: support@exclusive.com</span>
                </div>
            </aside>

            <main class="contact-form-section">
                <form>
                    <div class="form-row">
                        <input type="text" placeholder="Your Name *" required>
                        <input type="email" placeholder="Your Email *" required>
                        <input type="tel" placeholder="Your Phone *" required>
                    </div>

                    <textarea placeholder="Your Message" rows="8"></textarea>
                    <div>
                        <div class="btn-container"> <button type="submit" class="btn-send">Send Message</button>
                        </div>
                </form>
            </main>
        </div>
    </div>
    <div class="footer" id="foot"></div>
    <script src="../home.js"></script>
</body>

</html>
